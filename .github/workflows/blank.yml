name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 当推送到 main 分支时触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 核心：拉取代码

      # 如果是 mdBook，这里加入安装和构建步骤
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.37/mdbook-v0.4.37-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          mv mdbook /usr/local/bin/

      - name: Build with mdBook
        run: mdbook build

      # 上传构建后的静态文件 (mdBook 默认输出到 book 目录)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book' 

      # 部署到 GitHub Pages 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
